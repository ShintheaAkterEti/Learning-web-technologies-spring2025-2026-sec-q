<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>

<style>

body{
text-align:center;
font-family:Arial;
background-image: url("tic.jpg");
background-size: cover;
background-repeat: no-repeat;
background-position: center;
}

#board{
width:300px;
margin:auto;
}

.cell{
width:90px;
height:90px;
border:1px solid black;
display:inline-block;
font-size:40px;
line-height:90px;
cursor:pointer;
text-align:center;
vertical-align:top;



}

</style>

</head>

<body>

<h2>Tic Tac Toe</h2>

<p id="status">Player X Turn</p>

<div id="board">

<div class="cell" onclick="play(0)"></div>
<div class="cell" onclick="play(1)"></div>
<div class="cell" onclick="play(2)"></div><br>

<div class="cell" onclick="play(3)"></div>
<div class="cell" onclick="play(4)"></div>
<div class="cell" onclick="play(5)"></div><br>

<div class="cell" onclick="play(6)"></div>
<div class="cell" onclick="play(7)"></div>
<div class="cell" onclick="play(8)"></div>

</div>

<img id="winImage" src="winner.jpg" width="200" style="display:none; position:fixed; top: 20px; left:20%;" >

</br>

<button onclick="resetGame()">Reset Game</button>

<script src="script.js"></script>

</body>
</html>
